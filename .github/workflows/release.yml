name: Release Client

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: '要发布的 tag，例如 v2.0.1'
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Create release notes from commits
        env:
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
        run: |
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 "${TAG_NAME}^" 2>/dev/null || true)"
          if [ -n "$PREVIOUS_TAG" ]; then
            RANGE="$PREVIOUS_TAG..$TAG_NAME"
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${TAG_NAME}"
          else
            RANGE="$TAG_NAME"
            COMPARE_URL="https://github.com/${{ github.repository }}/commits/${TAG_NAME}"
          fi

          {
            echo "## 更新内容"
            echo
            git log "$RANGE" --no-merges --pretty=format:'- %s (%h)' || true
            echo
            echo
            echo "**Full Changelog**: $COMPARE_URL"
          } > release_notes.md

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "$TAG_NAME" --notes-file release_notes.md
          else
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes-file release_notes.md
          fi

  build-windows:
    name: Build Windows
    needs: create-release
    runs-on: windows-latest

    defaults:
      run:
        working-directory: client
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install build type dependencies
        run: npm install --no-save @types/plist

      - name: Rebuild Electron native dependencies
        run: npm run postinstall

      - name: Smoke test Electron native dependencies
        run: npm run smoke:electron-native

      - name: Sync package version from tag
        env:
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build renderer
        run: npm run build

      - name: Build Windows NSIS and ZIP artifacts
        run: npx electron-builder --win nsis zip --publish never

      - name: Build Windows MSI artifact
        run: npx electron-builder --win msi --publish never -c.productName=OpenBidKit_Yibiao -c.extraMetadata.author=mark -c.copyright="Copyright (c) 2026 mark"

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
        run: |
          shopt -s nullglob
          files=(release/*.exe release/*.msi release/*.zip release/*.blockmap release/latest*.yml)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi
          gh release upload "$TAG_NAME" "${files[@]}" --clobber

  build-macos:
    name: Build macOS ${{ matrix.arch }}
    needs: create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            arch: x64
          - runner: macos-15
            arch: arm64

    defaults:
      run:
        working-directory: client
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Verify runner architecture
        run: |
          actual_arch="$(node -p process.arch)"
          if [ "$actual_arch" != "${{ matrix.arch }}" ]; then
            echo "Expected ${{ matrix.arch }} runner, got ${actual_arch}."
            exit 1
          fi

      - name: Cache Electron build downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-${{ matrix.arch }}-electron-${{ hashFiles('client/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-electron-

      - name: Install dependencies
        run: npm ci

      - name: Install build type dependencies
        run: npm install --no-save @types/plist

      - name: Rebuild Electron native dependencies
        run: npm run postinstall

      - name: Smoke test Electron native dependencies
        run: npm run smoke:electron-native

      - name: Sync package version from tag
        env:
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Generate macOS icon
        run: |
          rm -rf assets/icon.iconset
          mkdir -p assets/icon.iconset
          sips -z 16 16 assets/icon_256.png --out assets/icon.iconset/icon_16x16.png
          sips -z 32 32 assets/icon_256.png --out assets/icon.iconset/icon_16x16@2x.png
          sips -z 32 32 assets/icon_256.png --out assets/icon.iconset/icon_32x32.png
          sips -z 64 64 assets/icon_256.png --out assets/icon.iconset/icon_32x32@2x.png
          sips -z 128 128 assets/icon_256.png --out assets/icon.iconset/icon_128x128.png
          sips -z 256 256 assets/icon_256.png --out assets/icon.iconset/icon_128x128@2x.png
          sips -z 256 256 assets/icon_256.png --out assets/icon.iconset/icon_256x256.png
          sips -z 512 512 assets/icon_256.png --out assets/icon.iconset/icon_256x256@2x.png
          sips -z 512 512 assets/icon_256.png --out assets/icon.iconset/icon_512x512.png
          sips -z 1024 1024 assets/icon_256.png --out assets/icon.iconset/icon_512x512@2x.png
          iconutil -c icns assets/icon.iconset -o assets/icon.icns

      - name: Build renderer
        run: npm run build

      - name: Preload Electron macOS runtime
        run: |
          export ELECTRON_CACHE="$HOME/Library/Caches/electron"
          ELECTRON_VERSION="$(node -p "require('./node_modules/electron/package.json').version")"
          file="$ELECTRON_CACHE/electron-v${ELECTRON_VERSION}-darwin-${{ matrix.arch }}.zip"
          mkdir -p "$ELECTRON_CACHE"

          if [ -f "$file" ] && unzip -tq "$file" >/dev/null 2>&1; then
            echo "Electron ${ELECTRON_VERSION} darwin-${{ matrix.arch }} already cached."
            exit 0
          fi

          tmp="${file}.tmp"
          rm -f "$file" "$tmp"
          curl --fail --location --retry 5 --retry-all-errors --retry-delay 10 \
            "https://github.com/electron/electron/releases/download/v${ELECTRON_VERSION}/electron-v${ELECTRON_VERSION}-darwin-${{ matrix.arch }}.zip" \
            --output "$tmp"
          unzip -tq "$tmp" >/dev/null
          mv "$tmp" "$file"

      - name: Build macOS artifacts
        run: |
          export ELECTRON_CACHE="$HOME/Library/Caches/electron"
          export ELECTRON_BUILDER_CACHE="$HOME/Library/Caches/electron-builder"

          for attempt in 1 2 3; do
            echo "Build macOS ${{ matrix.arch }} artifacts, attempt ${attempt}/3."
            if npx electron-builder --mac dmg:${{ matrix.arch }} --publish never; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            sleep $((attempt * 20))
          done

      - name: Verify packaged native architectures
        run: node scripts/verify-macos-native-arch.cjs "${{ matrix.arch }}" release

      - name: Package macOS DMG with instructions
        run: |
          shopt -s nullglob
          dmgs=(release/*.dmg)
          if [ ${#dmgs[@]} -ne 1 ]; then
            echo "Expected exactly one macOS ${{ matrix.arch }} DMG, found ${#dmgs[@]}."
            exit 1
          fi

          for dmg in "${dmgs[@]}"; do
            base="$(basename "$dmg" .dmg)"
            package_dir="release/${base}-package"
            rm -rf "$package_dir"
            mkdir -p "$package_dir"
            cp "$dmg" "$package_dir/"
            cat > "$package_dir/macOS使用说明.txt" <<'EOF'
          macOS 使用说明

          如果双击 App 提示“已损坏，无法打开”或“无法验证开发者”，这是因为本软件未进行 Apple 官方签名和公证，并不代表文件真的损坏。

          使用步骤：

          1. 双击 dmg 文件。
          2. 将“易标投标工具箱.app”拖到“应用程序”文件夹。
          3. 打开“终端”App。
          4. 执行下面命令：

          xattr -dr com.apple.quarantine /Applications/易标投标工具箱.app

          5. 再从“应用程序”中打开“易标投标工具箱”。

          如果仍无法打开，请右键点击 App，选择“打开”，再确认打开。
          EOF
            (cd release && ditto -c -k --sequesterRsrc --keepParent "$(basename "$package_dir")" "${base}-package.zip")
            rm -rf "$package_dir"
            rm -f "$dmg"
          done

      - name: Stage macOS release assets
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            client/release/*.zip
            client/release/*.blockmap
            client/release/latest-mac.yml
          if-no-files-found: error

  publish-macos:
    name: Publish macOS
    needs:
      - create-release
      - build-macos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install manifest tooling
        working-directory: client
        run: npm ci --ignore-scripts --omit=optional

      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-x64
          path: artifacts/x64

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: artifacts/arm64

      - name: Merge macOS update manifests
        run: |
          node client/scripts/merge-mac-update-manifests.cjs \
            artifacts/x64/latest-mac.yml \
            artifacts/arm64/latest-mac.yml \
            artifacts/latest-mac.yml

      - name: Upload macOS release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
        run: |
          shopt -s nullglob

          require_single_asset() {
            local label="$1"
            shift
            if [ "$#" -ne 1 ]; then
              echo "Expected exactly one ${label}, found $#."
              exit 1
            fi
          }

          require_single_asset "macOS x64 package ZIP" artifacts/x64/*-package.zip
          require_single_asset "macOS x64 DMG blockmap" artifacts/x64/*.dmg.blockmap
          require_single_asset "macOS arm64 package ZIP" artifacts/arm64/*-package.zip
          require_single_asset "macOS arm64 DMG blockmap" artifacts/arm64/*.dmg.blockmap
          require_single_asset "merged macOS update manifest" artifacts/latest-mac.yml

          files=(
            artifacts/x64/*.zip
            artifacts/x64/*.blockmap
            artifacts/arm64/*.zip
            artifacts/arm64/*.blockmap
            artifacts/latest-mac.yml
          )
          gh release upload "$TAG_NAME" "${files[@]}" --clobber

  publish-r2-release:
    name: Publish R2 Release
    needs:
      - build-windows
      - publish-macos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install R2 publish tooling
        run: npm install --no-save --package-lock=false @aws-sdk/client-s3

      - name: Download GitHub Release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
        run: |
          mkdir -p release-assets
          gh release download "$TAG_NAME" --dir release-assets --clobber
          gh release view "$TAG_NAME" --json tagName,name,body,isPrerelease,isDraft,url > github-release.json
          ls -lah release-assets

      - name: Publish release assets to Cloudflare R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ vars.R2_BUCKET || 'openbidkit' }}
          R2_RELEASE_PREFIX: ${{ vars.R2_RELEASE_PREFIX || 'release' }}
          R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL }}
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
          RELEASE_ASSETS_DIR: release-assets
          GITHUB_RELEASE_JSON: github-release.json
        run: node .github/scripts/publish-r2-release.mjs
